name: Daily Newspaper Scraper

on:
  schedule:
    # Runs at 00:30 UTC every day (6:00 AM Sri Lanka Time)
    - cron: '30 0 * * *'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './scripts/newspaper-automation/package-lock.json'

      - name: Install Dependencies
        working-directory: ./scripts/newspaper-automation
        run: npm ci

      - name: Run Web Scraper
        working-directory: ./scripts/newspaper-automation
        env:
          # This secret must be added to the GitHub repository settings
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
