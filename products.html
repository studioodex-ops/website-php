    <!-- Main Logic -->
    <script type="module">
        import { db, collection, getDocs, getDoc, doc, query, orderBy, limit, startAfter, where, onSnapshot } from './assets/js/firebase-config.js';
        import { escapeHtml, escapeJs } from './assets/js/utils.js';
        import { addToCart } from './assets/js/cart.js'; // Explicit Import

        // --- GLOBAL ERROR DIAGNOSTICS ---
        window.onerror = function(msg, url, line, col, error) {
            const grid = document.getElementById('product-grid');
            if (grid) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-red-50 rounded-3xl border border-red-100 m-4">
                        <p class="text-red-600 font-bold mb-2">Shop Initialization Error</p>
                        <p class="text-xs text-red-500 mb-4">${msg}</p>
                        <p class="text-[10px] text-gray-400">Location: ${url}:${line}:${col}</p>
                        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg text-xs font-bold shadow-lg">Retry Loading</button>
                    </div>
                `;
            }
            return false;
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('product-grid');
            const loadMoreBtn = document.getElementById('load-more-btn');
            const loadMoreContainer = document.getElementById('load-more-container');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const sortSelect = document.getElementById('sort-select');

            // State
            let allProducts = [];
            let lastVisible = null;
            let PRODUCTS_PER_PAGE = 12;
            let isFetching = false;
            let noMoreProducts = false;
            let searchIndex = []; // Pre-fetched products for autocomplete

            // Handle URL Query Params
            const params = new URLSearchParams(window.location.search);
            const urlSearch = params.get('search');
            let urlCategory = params.get('category');
            
            // --- FAIL-SAFE: Reconstruct category if split by unencoded '&' ---
            if (window.location.search.includes('category=') && window.location.search.includes('&') && !window.location.search.includes('%26')) {
                const searchPart = window.location.search.substring(1); // remove ?
                const pairs = searchPart.split('&');
                let foundCat = '';
                let collecting = false;
                for (const p of pairs) {
                    if (p.startsWith('category=')) {
                        foundCat = p.split('=')[1];
                        collecting = true;
                    } else if (collecting) {
                        // Check if this looks like another param or part of category
                        if (p.includes('=')) {
                            collecting = false; // Next real param started
                        } else {
                            foundCat += ' & ' + p;
                        }
                    }
                }
                if (foundCat) urlCategory = decodeURIComponent(foundCat);
            }

            let currentCategory = (urlCategory ? urlCategory.trim() : 'all');
            let currentSubCategory = (params.get('subcategory') ? params.get('subcategory').trim() : null);
            let currentSearchTerm = urlSearch ? urlSearch.toLowerCase().trim() : '';

            // Global debug hook
            window.shopState = { get currentCategory() { return currentCategory; }, get allProducts() { return allProducts; } };

            // --- DYNAMIC CATEGORIES ENGINE ---
            function loadDynamicCategories() {
                const ref = doc(db, 'settings', 'categories_config');
                onSnapshot(ref, (docSnap) => {
                    if (docSnap.exists()) {
                        const categories = docSnap.data().data || {};
                        renderDynamicCategoryBar(categories);
                    }
                }, (error) => {
                    // Bug Fix #6: Add error handler for onSnapshot
                    console.error('Error loading dynamic categories:', error);
                    renderDynamicCategoryBar({}); // Fallback to empty
                });
            }

            function renderDynamicCategoryBar(categories) {
                const wrapper = document.getElementById('dynamic-categories-wrapper');
                if (!wrapper) return;
                wrapper.innerHTML = '';

                Object.keys(categories).sort().forEach(catName => {
                    const catData = categories[catName];
                    const hasSubcategories = Object.values(catData).some(subs => subs.length > 0);

                    const div = document.createElement('div');
                    div.className = "relative group static-on-mobile";

                    let buttonHtml = `
                        <button onclick="filterByCategory('${escapeJs(catName)}')"
                            class="filter-btn px-6 py-2.5 rounded-full border border-gray-300 bg-white text-gray-900 hover:border-black hover:bg-gray-100 transition-all text-sm font-bold flex items-center gap-2 shadow-sm"
                            data-filter="${escapeHtml(catName)}">
                            <span>${escapeHtml(catName)}</span>
                            ${hasSubcategories ? `
                                <svg class="w-3 h-3 ml-1 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                </svg>
                            ` : ''}
                        </button>
                    `;

                    let dropdownHtml = '';
                    if (hasSubcategories) {
                        // Use Mega Menu style if many subcategories, else simple dropdown
                        const totalSubs = Object.values(catData).reduce((sum, subs) => sum + subs.length, 0);
                        const isMega = totalSubs > 8;

                        dropdownHtml = `
                            <div class="absolute left-1/2 md:left-0 transform -translate-x-1/2 md:translate-x-0 mt-2 ${isMega ? 'w-[90vw] md:w-[600px] p-6' : 'w-[220px] py-2'} bg-white border border-gray-200 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 text-left top-full overflow-hidden">
                                <div class="${isMega ? 'grid grid-cols-1 md:grid-cols-3 gap-6' : 'space-y-1'}">
                                    ${Object.entries(catData).map(([groupName, subs]) => `
                                        <div>
                                            ${isMega || groupName !== 'General' ? `<h4 class="font-bold text-black border-b border-gray-100 pb-2 mb-3 uppercase text-[10px] tracking-wider">${escapeHtml(groupName)}</h4>` : ''}
                                            <ul class="space-y-1 text-sm text-gray-600">
                                                ${Array.isArray(subs) ? subs.map(sub => `
                                                    <li>
                                                        <a href="#" onclick="event.preventDefault(); window.filterBySubCategory('${escapeJs(sub)}', '${escapeJs(catName)}')" 
                                                           class="block px-3 py-1.5 hover:bg-gray-50 hover:text-black rounded-lg transition-colors">
                                                            ${escapeHtml(sub)}
                                                        </a>
                                                    </li>
                                                `).join('') : ''}
                                            </ul>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }

                    div.innerHTML = buttonHtml + dropdownHtml;
                    wrapper.appendChild(div);
                });

                // Re-apply active state to buttons
                updateFilterButtons(currentCategory);
            }

            loadDynamicCategories();

            // Expose subcategory filter function to global window scope so HTML onclicks work
            window.filterBySubCategory = (subCat, mainCat = 'Stationery') => {
                console.log(`Filtering by subcategory: ${subCat} in category: ${mainCat}`);

                // Set main category if not already
                if (currentCategory !== mainCat) {
                    // Update main buttons UI
                    updateFilterButtons(mainCat);
                    currentCategory = mainCat;
                }

                currentSubCategory = subCat;

                // Optional: Update UI to show selected subcategory (maybe a breadcrumb or tag?)
                // For now, just reload products
                allProducts = [];
                lastVisible = null;
                noMoreProducts = false;
                fetchProducts(false);
            };

            // --- GLOBAL CATEGORY FILTER FUNCTION ---
            // Exposed to window so dynamic onclick="filterByCategory('...')" handlers work
            window.filterByCategory = (category) => {
                console.log(`Filtering by category: ${category}`);
                currentCategory = category;
                currentSubCategory = null; // Reset subcategory on main category change

                // Update button UI
                updateFilterButtons(category);

                // Update URL
                const url = new URL(window.location);
                if (category === 'all') {
                    url.searchParams.delete('category');
                } else {
                    url.searchParams.set('category', category);
                }
                window.history.pushState({}, '', url);

                // Reset pagination and fetch
                allProducts = [];
                lastVisible = null;
                noMoreProducts = false;
                fetchProducts(false);
            };

            function updateFilterButtons(selectedCat) {
                // Re-query buttons as they are now dynamic
                const allFilterBtns = document.querySelectorAll('.filter-btn');
                allFilterBtns.forEach(btn => {
                    btn.classList.remove('bg-black', 'text-white', 'active', 'font-bold');
                    btn.classList.add('text-gray-900', 'border-gray-300', 'bg-white');

                    if (btn.dataset.filter === selectedCat) {
                        btn.classList.add('bg-black', 'text-white', 'active', 'font-bold');
                        btn.classList.remove('text-gray-900', 'border-gray-300', 'bg-white');
                    }
                });
            }

            // Update Active Button UI
            filterBtns.forEach(btn => {
                const iconBox = btn.querySelector('span:first-child');
                const textSpan = btn.querySelector('span:last-child');

                // Remove existing high-contrast classes if present from previous logic
                btn.classList.remove('bg-black', 'text-white', 'border-black');

                if (btn.dataset.filter === currentCategory) {
                    btn.classList.add('bg-black', 'text-white', 'font-bold');
                    btn.classList.remove('bg-white', 'text-gray-900', 'border-gray-300');

                    // Update Icon
                    if (iconBox) {
                        iconBox.classList.remove('bg-card', 'text-secondary');
                    }
                } else {
                    btn.classList.remove('bg-black', 'text-white', 'font-bold');
                    btn.classList.add('bg-white', 'text-gray-900', 'border-gray-300'); // Consistent Inactive Style

                    // Reset Icon
                    if (iconBox) {
                        // iconBox.classList...
                    }
                }
            });

            // Initial Loading State
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mb-4"></div>
                    <p class="text-gray-400">Loading ${currentCategory === 'all' ? 'products' : currentCategory}...</p>
                </div>
            `;

            // --- FETCH DATA (PAGINATED & FILTERED) ---
            async function fetchProducts(isLoadMore = false) {
                if (isFetching || (noMoreProducts && isLoadMore)) return;
                isFetching = true;

                if (isLoadMore) {
                    loadMoreBtn.innerText = "Loading...";
                    loadMoreBtn.disabled = true;
                } else {
                    grid.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center py-20">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mb-4"></div>
                            <p class="text-gray-400">Loading...</p>
                        </div>
                    `;
                    loadMoreContainer.classList.add('hidden');
                }

                try {
                    let q;
                    const productsRef = collection(db, "products");
                    const constraints = [];

                    if (currentCategory !== 'all') {
                        const searchCats = [
                            currentCategory,
                            currentCategory.toLowerCase(),
                            currentCategory.toUpperCase(),
                            currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1).toLowerCase(),
                            currentCategory.replace(/&/g, '%26'),
                            currentCategory.replace(/%26/g, '&')
                        ];
                        const uniqueCats = [...new Set(searchCats.map(c => c.trim()))].filter(c => c.length > 0);
                        constraints.push(where("category", "in", uniqueCats));
                    }

                    if (currentSubCategory) {
                        constraints.push(where("subcategory", "==", currentSubCategory));
                    }

                    if (!currentSearchTerm) {
                        constraints.push(limit(PRODUCTS_PER_PAGE));
                        if (isLoadMore && lastVisible) {
                            constraints.push(startAfter(lastVisible));
                        }
                    }

                    q = query(productsRef, ...constraints);
                    const querySnapshot = await getDocs(q);

                    if (querySnapshot.empty) {
                        noMoreProducts = true;
                        if (!isLoadMore) {
                            grid.innerHTML = '<p class="text-center col-span-full text-gray-400 py-12">No products found in this category.</p>';
                        }
                        loadMoreContainer.classList.add('hidden');
                        isFetching = false;
                        if (!isLoadMore) allProducts = [];
                        return;
                    }

                    // Update Cursor
                    lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];

                    // Process Data
                    let newProducts = [];
                    querySnapshot.forEach((doc) => {
                        newProducts.push({ id: doc.id, ...doc.data() }); // Ensure ID is captured
                    });

                    // Search filtering (Local)
                    if (currentSearchTerm) {
                        newProducts = newProducts.filter(p => {
                            const nameMatch = p.name && p.name.toLowerCase().includes(currentSearchTerm);
                            const descMatch = p.desc && p.desc.toLowerCase().includes(currentSearchTerm);
                            const catMatch = p.category && p.category.toLowerCase().includes(currentSearchTerm);
                            const subMatch = p.subcategory && p.subcategory.toLowerCase().includes(currentSearchTerm);
                            return nameMatch || descMatch || catMatch || subMatch;
                        });
                    }

                    if (isLoadMore) {
                        allProducts = [...allProducts, ...newProducts];
                    } else {
                        allProducts = newProducts;
                        noMoreProducts = false;
                    }

                    renderProducts();

                    // Show/Hide Load More
                    if (currentSearchTerm) {
                        noMoreProducts = true;
                        loadMoreContainer.classList.add('hidden');
                    } else if (querySnapshot.docs.length < PRODUCTS_PER_PAGE) {
                        noMoreProducts = true;
                        loadMoreContainer.classList.add('hidden');
                    } else {
                        loadMoreContainer.classList.remove('hidden');
                        noMoreProducts = false;
                    }

                } catch (error) {
                    console.error("Error fetching products:", error);
                    if (!isLoadMore) {
                        grid.innerHTML = `
                            <div class="col-span-full text-center py-20 text-red-500">
                                <p>Unable to load products. Please check your connection.</p>
                                <p class="text-xs mt-2 text-gray-400">${error.message}</p>
                            </div>
                        `;
                    }
                } finally {
                    isFetching = false;
                    if (isLoadMore) {
                        loadMoreBtn.innerText = "Load More";
                        loadMoreBtn.disabled = false;
                    }
                }
            }

            // --- RENDER FUNCTION ---
            function renderProducts() {
                let filtered = allProducts;
                const sortValue = sortSelect.value;

                // Sort client-side since we fetched chunk without sort
                filtered = [...filtered];

                if (sortValue === 'price-asc') {
                    filtered.sort((a, b) => {
                        const pA = parseFloat(String(a.price || '0').replace(/Rs\.|\s|,/gi, '')) || 0;
                        const pB = parseFloat(String(b.price || '0').replace(/Rs\.|\s|,/gi, '')) || 0;
                        return pA - pB;
                    });
                } else if (sortValue === 'price-desc') {
                    filtered.sort((a, b) => {
                        const pA = parseFloat(String(a.price || '0').replace(/Rs\.|\s|,/gi, '')) || 0;
                        const pB = parseFloat(String(b.price || '0').replace(/Rs\.|\s|,/gi, '')) || 0;
                        return pB - pA;
                    });
                } else if (sortValue === 'name') {
                    filtered.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
                }

                if (filtered.length === 0) {
                    grid.innerHTML = '<p class="text-center col-span-full text-gray-400 py-12">No products found.</p>';
                    return;
                }

                grid.innerHTML = filtered.map(p => {
                    let imageHTML = '';
                    if (p.image && p.image.startsWith('emoji:')) {
                        const emoji = p.image.split(':')[1];
                        imageHTML = `<span class="text-4xl">${emoji}</span>`;
                    } else {
                        const imgSrc = p.image || 'https://placehold.co/400x400?text=No+Image';
                        imageHTML = `<img src="${imgSrc}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">`;
                    }

                    const unit = p.unit || 'unit';
                    const step = unit === 'kg' ? 0.5 : 1;
                    const min = unit === 'kg' ? 0.5 : 1;
                    const initialQty = min;

                    const isOutOfStock = (p.stock !== undefined && p.stock <= 0) || p.active === false;
                    const isNews = p.category === 'Newspapers' || p.category === 'News' || p.automated === true;

                    // Updated Link: Now wraps the image and title area
                    const productUrl = isNews ? p.link : `product.html?id=${p.id}`;

                    let actionAreaHTML = '';
                    if (isNews) {
                        actionAreaHTML = `
                            <div class="mt-auto">
                                <a href="${p.link}" target="_blank" class="w-full text-center bg-black text-white py-2 rounded-md font-bold text-sm hover:bg-gray-800 transition-all block mt-4 border border-gray-800">
                                    Read Article
                                </a>
                            </div>
                        `;
                    } else {
                        actionAreaHTML = `
                            <div class="mt-auto">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="font-bold text-lg text-primary">${escapeHtml(p.price)} <span class="text-xs text-secondary font-normal">/ ${escapeHtml(unit)}</span></span>
                                </div>
                                <div class="flex flex-col md:flex-row items-center gap-2 bg-white/5 border border-glass rounded-lg p-2">
                                    <div class="flex items-center justify-center w-full md:w-auto justify-between md:justify-start gap-4 md:gap-0">
                                        <button onclick="window.adjustQty('${escapeJs(p.id)}', -${step}, ${min})" ${isOutOfStock ? 'disabled' : ''} class="w-8 h-8 flex items-center justify-center text-secondary hover:text-primary hover:bg-white/10 rounded-md transition-colors font-bold text-lg bg-gray-100 md:bg-transparent">-</button>
                                        <span id="qty-${escapeHtml(p.id)}" class="w-8 text-center font-bold text-sm bg-transparent text-primary">${initialQty}</span>
                                        <button onclick="window.adjustQty('${escapeJs(p.id)}', ${step}, ${min})" ${isOutOfStock ? 'disabled' : ''} class="w-8 h-8 flex items-center justify-center text-secondary hover:text-primary hover:bg-white/10 rounded-md transition-colors font-bold text-lg bg-gray-100 md:bg-transparent">+</button>
                                    </div>
                                    <button onclick="try { window.addToCartWithQty('${escapeJs(p.id)}', '${escapeJs(p.name)}', '${escapeJs(p.price)}', '${escapeJs(unit)}', ${p.stock !== undefined ? p.stock : 999999}); } catch(e) { alert('JS Error: ' + e); }"
                                        ${isOutOfStock ? 'disabled' : ''}
                                        class="w-full md:flex-1 bg-blue-600 text-white py-2 rounded-md font-bold text-sm hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2 disabled:bg-gray-500 disabled:cursor-not-allowed shadow-lg">
                                        ${isOutOfStock ? 'Sold Out' : `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg> Add`}
                                    </button>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div id="product-${p.id}" class="product-card group relative bg-card rounded-2xl overflow-hidden hover:shadow-2xl transition-all duration-300 border border-glass animate-fade-in flex flex-col h-full ${isOutOfStock && !isNews ? 'opacity-75 grayscale' : ''} ${p.isDeepLink ? 'ring-2 ring-accent-color transform scale-105 z-10 shadow-purple-500/20' : ''}">
                            ${isOutOfStock && !isNews ? '<div class="absolute top-3 right-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-md z-10">Out of Stock</div>' : ''}
                            
                            <button onclick="shareProduct('${escapeJs(p.id)}')" class="absolute top-3 left-3 bg-black/20 hover:bg-black/50 backdrop-blur-md text-white p-2 rounded-full z-10 transition-colors opacity-0 group-hover:opacity-100" title="Copy Link">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                                </svg>
                            </button>

                            <a href="${productUrl}" ${isNews ? 'target="_blank"' : ''} class="block aspect-w-1 aspect-h-1 bg-white/5 flex items-center justify-center ${p.image && p.image.startsWith('emoji:') ? 'p-8' : ''} h-64 overflow-hidden relative cursor-pointer">
                                ${imageHTML}
                            </a>

                            <div class="p-3 md:p-6 flex flex-col flex-grow">
                                <span class="text-xs font-bold text-secondary uppercase tracking-widest mb-2 block">${escapeHtml(p.category)} ${p.subcategory ? '• ' + escapeHtml(p.subcategory) : ''}</span>
                                <a href="${productUrl}" ${isNews ? 'target="_blank"' : ''} class="hover:underline decoration-primary">
                                    <h3 class="text-lg font-bold font-heading mb-2 leading-tight text-primary">${escapeHtml(p.name)}</h3>
                                </a>
                                <p class="text-secondary text-sm mb-4 line-clamp-1">${escapeHtml(p.desc)}</p>
                                ${actionAreaHTML}
                            </div>
                        </div>
                        `;
                }).join('');

                // Show recommendations based on first product
                if (filtered.length > 0 && window.getRecommendations && window.renderRecommendations) {
                    setTimeout(async () => {
                        try {
                            const recs = await window.getRecommendations(filtered[0], 4);
                            window.renderRecommendations('recommendations-container', recs);
                        } catch (e) {
                            console.warn('Error showing recommendations:', e);
                        }
                    }, 500);
                }
            }

            // Expose Logic
            window.adjustQty = (id, change, min) => {
                const qtyEl = document.getElementById(`qty-${id}`);
                let currentQty = parseFloat(qtyEl.innerText);
                let newQty = currentQty + change;
                if (newQty < min) newQty = min;
                newQty = Math.round(newQty * 100) / 100;
                qtyEl.innerText = newQty;
            };

            window.addToCartWithQty = (id, name, price, unit, maxStock) => {
                const qtyEl = document.getElementById(`qty-${id}`);
                const qty = parseFloat(qtyEl.innerText);
                // Directly call the imported function
                addToCart(name, price, qty, unit, maxStock);
            };

            // --- EVENT LISTENERS ---

            const searchInputEl = document.getElementById('page-search-input');
            const clearSearchBtn = document.getElementById('clear-search-btn');

            if (searchInputEl) {
                // Initialize from URL
                if (currentSearchTerm) {
                    searchInputEl.value = urlSearch;
                    clearSearchBtn.classList.remove('hidden');
                }

                searchInputEl.addEventListener('input', (e) => {
                    const val = e.target.value;
                    if (val) {
                        clearSearchBtn.classList.remove('hidden');
                    } else {
                        clearSearchBtn.classList.add('hidden');
                    }
                });
                
                // --- SEARCH AUTOCOMPLETE LOGIC ---
                const autocompleteResults = document.getElementById('autocomplete-results');
                let selectedIndex = -1;

                async function initSearchIndex() {
                    try {
                        const snap = await getDocs(query(collection(db, "products")));
                        searchIndex = snap.docs.map(doc => ({
                            id: doc.id,
                            name: doc.data().name || '',
                            category: doc.data().category || '',
                            image: doc.data().image || 'emoji:📦'
                        })).filter(p => p.name.length > 0);
                        console.log(`Autocomplete Index loaded: ${searchIndex.length} items.`);
                    } catch (e) {
                        console.warn("Autocomplete load failed:", e);
                    }
                }
                initSearchIndex();

                function renderAutocomplete(results, val) {
                    if (!results.length) {
                        if (val && val.length >= 1) {
                            autocompleteResults.innerHTML = `
                                <div class="p-4 text-center text-secondary text-xs italic">
                                    No suggestions for "${escapeHtml(val)}"
                                </div>
                            `;
                            autocompleteResults.style.display = 'block';
                        } else {
                            autocompleteResults.style.display = 'none';
                        }
                        return;
                    }
                    
                    autocompleteResults.innerHTML = results.slice(0, 8).map((p, i) => {
                        let imageHTML = '';
                        if (p.image && p.image.startsWith('emoji:')) {
                            imageHTML = `<div class="item-emoji">${p.image.split(':')[1]}</div>`;
                        } else {
                            imageHTML = `<img src="${p.image}" class="w-8 h-8 rounded-lg object-cover">`;
                        }

                        return `
                            <div class="suggestion-item ${i === selectedIndex ? 'selected' : ''}" 
                                 onclick="window.selectSuggestion('${escapeJs(p.name)}')"
                                 data-index="${i}">
                                ${imageHTML}
                                <div class="item-details">
                                    <span class="item-name">${escapeHtml(p.name)}</span>
                                    <span class="item-meta">${escapeHtml(p.category)}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                    autocompleteResults.style.display = 'block';
                }

                window.selectSuggestion = (name) => {
                    searchInputEl.value = name;
                    autocompleteResults.style.display = 'none';
                    triggerSearch(name);
                };

                const triggerSearch = (val) => {
                    const searchVal = val.toLowerCase();
                    if (searchVal !== currentSearchTerm) {
                        currentSearchTerm = searchVal;
                        allProducts = [];
                        lastVisible = null;
                        noMoreProducts = false;

                        // Update URL
                        const url = new URL(window.location);
                        if (searchVal) url.searchParams.set('search', val);
                        else url.searchParams.delete('search');
                        window.history.pushState({}, '', url);

                        fetchProducts(false);
                    }
                };

                let searchTimeout;
                searchInputEl.addEventListener('keyup', (e) => {
                    const val = e.target.value;
                    
                    // Handle Navigation
                    if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Enter') {
                        const items = autocompleteResults.querySelectorAll('.suggestion-item');
                        if (e.key === 'ArrowDown') selectedIndex = (selectedIndex + 1) % items.length;
                        if (e.key === 'ArrowUp') selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                        if (e.key === 'Enter' && selectedIndex >= 0) {
                            const selectedName = items[selectedIndex].querySelector('.item-name').innerText;
                            window.selectSuggestion(selectedName);
                            return;
                        }
                        renderAutocomplete(searchIndex.filter(p => p.name.toLowerCase().includes(val.toLowerCase())));
                        return;
                    }

                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        if (val.length >= 1) {
                            const matches = searchIndex.filter(p => 
                                p.name.toLowerCase().includes(val.toLowerCase()) || 
                                p.category.toLowerCase().includes(val.toLowerCase())
                            );
                            selectedIndex = -1;
                            renderAutocomplete(matches, val);
                        } else {
                            autocompleteResults.style.display = 'none';
                        }
                        
                        // Traditional Search Trigger
                        triggerSearch(val);
                    }, 300); 
                });

                // Hide autocomplete when clicking outside
                document.addEventListener('click', (e) => {
                    if (!searchInputEl.contains(e.target) && !autocompleteResults.contains(e.target)) {
                        autocompleteResults.style.display = 'none';
                    }
                });

                clearSearchBtn.addEventListener('click', () => {
                    searchInputEl.value = '';
                    clearSearchBtn.classList.add('hidden');

                    if (currentSearchTerm !== '') {
                        currentSearchTerm = '';
                        allProducts = [];
                        lastVisible = null;
                        noMoreProducts = false;

                        const url = new URL(window.location);
                        url.searchParams.delete('search');
                        window.history.pushState({}, '', url);

                        fetchProducts(false);
                    }
                });
            }

            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', () => {
                    fetchProducts(true);
                });
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => {
                        b.classList.remove('bg-black', 'text-white', 'border-black');
                        b.classList.add('text-gray-500', 'border-gray-200');
                    });
                    btn.classList.remove('text-gray-500', 'border-gray-200');
                    btn.classList.add('bg-black', 'text-white', 'border-black');

                    currentCategory = btn.dataset.filter;
                    currentSubCategory = null; // Reset subcat on main cat change

                    // Update URL
                    const url = new URL(window.location);
                    url.searchParams.set('category', currentCategory);
                    window.history.pushState({}, '', url);

                    // Reset Logic
                    allProducts = [];
                    lastVisible = null;
                    noMoreProducts = false;
                    fetchProducts(false);
                });
            });

            // Sort Listener
            sortSelect.addEventListener('change', () => {
                renderProducts();
            });

            fetchProducts();

            // --- DEEP LINKING & SHARE LOGIC ---
            window.shareProduct = (id) => {
                const url = `${window.location.origin}/product.html?id=${id}`;
                navigator.clipboard.writeText(url).then(() => {
                    // Show a toast or alert
                    const toast = document.createElement('div');
                    toast.className = 'fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-black text-white px-4 py-2 rounded-full text-sm font-bold shadow-xl z-50 animate-fade-in-up';
                    toast.innerText = 'Link Copied to Clipboard! 📋';
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 2000);
                }).catch(err => console.error('Could not copy text: ', err));
            };

            const urlProductId = params.get('id');
            if (urlProductId) {
                handleDeepLink(urlProductId);
            }

            async function handleDeepLink(id) {
                try {
                    // Temporarily show loading state if you want, or just fetch
                    const docRef = doc(db, "products", id);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const product = { id: docSnap.id, ...docSnap.data(), isDeepLink: true };
                        // Prepend to allProducts or set as the only one? 
                        // Let's prepend it so user sees it first, but can still browse others.
                        // Wait for initial fetch to complete? 
                        // Actually, if we prepend it now, the initial fetch (which is async) might overwrite 'allProducts' or append to it.
                        // Let's handle it by modifying 'allProducts' AFTER fetchProducts completes, or inject it.
                        // However, 'fetchProducts' is called above.

                        // Let's wait a bit or push it to the top after fetch
                        // A cleaner way: Push to top of list and re-render.
                        // Since fetchProducts is async, we can't easily guarantee order unless we chain.
                        // But simply rendering it immediately into the grid alongside others is fine.

                        // Let's just add it to 'allProducts' and re-render immediately.
                        // If it's duplicating what fetchProducts brings, we should de-dupe.

                        // Better approach:
                        // Just toggle the category to 'all' (default)
                        // And verify if it's already in the list. if not, add it.
                        // Then scroll to it.

                        // For simplicity: We will just wait for window load or 1s, then check.
                        // Or, just set it as a special item.

                        setTimeout(() => {
                            const exists = allProducts.find(p => p.id === id);
                            if (!exists) {
                                allProducts.unshift(product);
                            } else {
                                // Mark existing as deep link for highlighting
                                exists.isDeepLink = true;
                                // Move to top
                                allProducts = allProducts.filter(p => p.id !== id);
                                allProducts.unshift(exists);
                            }
                            renderProducts();

                            // Scroll to View
                            setTimeout(() => {
                                const el = document.getElementById(`product-${id}`);
                                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 500);
                        }, 1000); // Wait for initial fetch

                    } else {
                        console.log("No such product!");
                    }
                } catch (e) {
                    console.error("Deep link error:", e);
                }
            }
        });
    </script>
    <script type="module" src="assets/js/seasonal.js?v=1.0"></script>
